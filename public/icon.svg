<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 141度のグラデーション: linear-gradient(141deg, #23f0a3 0%, #37e8ff 50%, #0f9cff) -->
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23f0a3"/>
      <stop offset="50%" stop-color="#37e8ff"/>
      <stop offset="100%" stop-color="#0f9cff"/>
    </linearGradient>
    <!-- ドロップシャドウ用のフィルター -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- グラデーション背景の円 -->
  <circle cx="16" cy="16" r="16" fill="url(#gradient)"/>
  <!-- MessageCircleアイコン（24x24 viewBoxを中央配置、少し小さめにスケール） -->
  <g transform="translate(6, 6) scale(0.833)" filter="url(#shadow)">
    <!-- MessageCircleのパス（元のパスをそのまま使用、strokeベースで描画） -->
    <path 
      d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z" 
      fill="none" 
      stroke="white" 
      stroke-width="2.5" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      opacity="0.95"
    />
  </g>
</svg>
